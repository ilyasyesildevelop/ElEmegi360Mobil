name: elemegi360
description: El Emeği 360 — ev işçiliği kayıt ve hakediş (Fabrika 360 Suite)
publish_to: "none"
version: 26.5.1+26050100

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  http: ^1.2.2
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#1A1F36"
  adaptive_icon_foreground: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - assets/images/bg_02.webp
    - assets/images/pass_show.png
    - assets/images/pass_hide.png
